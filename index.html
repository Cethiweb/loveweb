<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cethi 💕 Love Story</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Poppins',sans-serif;
    background:linear-gradient(180deg,#ffb6d9,#ffd6ec);
    color:white;
    text-align:center;
    overflow-x:hidden;
}

/* INTRO MOBILE */
.intro {
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    animation:fadeOut 2.5s ease forwards;
    animation-delay:2.5s;
    z-index:10;
}

.intro h1 {
    font-size:28px;
    animation:fadeZoom 2s ease;
}

@keyframes fadeZoom {
    from { opacity:0; transform:scale(0.8); }
    to { opacity:1; transform:scale(1); }
}

@keyframes fadeOut {
    to { opacity:0; visibility:hidden; }
}

/* CONTAINER */
.container {
    padding:20px;
    opacity:0;
    animation:fadeInMain 1.5s ease 2.5s forwards;
}

@keyframes fadeInMain {
    to { opacity:1; }
}

/* GLASS CARD MOBILE */
.card {
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

h2 { font-size:20px; margin-bottom:10px; }

.counter { font-size:14px; margin-bottom:15px; }

/* BUTTON MOBILE FRIENDLY */
button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    margin:6px 0;
    font-size:14px;
    cursor:pointer;
    transition:0.2s;
}

button:active {
    transform:scale(0.96);
}

.btn-main { background:white; color:#ff4da6; }
.btn-surprise { background:#ff4da6; color:white; }

/* GALLERY MOBILE */
.gallery {
    margin-top:15px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.gallery img {
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:15px;
}

/* SURPRISE FULLSCREEN */
.surprise {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    top:0;
    left:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
    text-align:center;
    z-index:9;
}

.surprise h1 {
    font-size:20px;
    margin-bottom:20px;
}

/* EFFECT (lighter for HP) */
.effect {
    position:fixed;
    top:-10px;
    pointer-events:none;
    animation:fall linear forwards;
}

@keyframes fall {
    to {
        transform:translateY(105vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="intro">
    <h1>Cethi 💕 Sevia</h1>
    <p style="font-size:12px;">Our Love Story</p>
</div>

<div class="container">
    <div class="card">
        <h2>Forever With You ❤️</h2>
        <div class="counter" id="counter"></div>

        <button class="btn-main" onclick="playMusic()">Play Music 🎵</button>
        <button class="btn-surprise" onclick="openSurprise()">Special Surprise 💌</button>

        <div class="gallery">
            <img src="foto1.jpg">
            <img src="foto2.jpg">
            <img src="foto3.jpg">
            <img src="foto4.jpg">
        </div>
    </div>
</div>

<div class="surprise" id="surprise">
    <h1>
        Aku bersyukur memilikimu ❤️<br><br>
        Semoga kita selalu bersama sampai tua nanti 💍
    </h1>
    <button class="btn-main" onclick="closeSurprise()">Kembali</button>
</div>

<audio id="bgMusic" loop>
    <source src="musik.mp3" type="audio/mp3">
</audio>

<script>
// HITUNG HARI
const startDate=new Date("2021-08-08"); // ganti tanggal
const diff=Math.floor((new Date()-startDate)/(1000*60*60*24));
document.getElementById("counter").innerHTML=
"Sudah bersama "+diff+" hari 💖";

// MUSIC
function playMusic(){
    document.getElementById("bgMusic").play();
}

// SURPRISE
function openSurprise(){
    document.getElementById("surprise").style.display="flex";
}
function closeSurprise(){
    document.getElementById("surprise").style.display="none";
}

// LIGHT EFFECT (lebih ringan untuk HP)
const symbols=["❤️","🌸","❄️"];
setInterval(()=>{
    let el=document.createElement("div");
    el.className="effect";
    el.innerHTML=symbols[Math.floor(Math.random()*symbols.length)];
    el.style.left=Math.random()*window.innerWidth+"px";
    el.style.fontSize=(Math.random()*15+10)+"px";
    el.style.animationDuration=(Math.random()*4+4)+"s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),8000);
},700); // lebih jarang supaya tidak berat
</script>

</body>
</html>
